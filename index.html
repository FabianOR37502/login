<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login & Registro | Dual Tabs</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="particle" style="width: 150px; height: 150px; top: -50px; left: -30px; animation-duration: 14s;"></div>
    <div class="particle" style="width: 220px; height: 220px; bottom: -70px; right: -50px; animation-duration: 18s;"></div>
    <div class="particle" style="width: 100px; height: 100px; top: 20%; right: 8%; animation-duration: 11s;"></div>
    <div class="particle" style="width: 130px; height: 130px; bottom: 15%; left: 5%; animation-duration: 16s;"></div>

    <div class="glass-card">
        <!-- Pestañas (Tabs) -->
        <div class="tabs-container">
            <button class="tab-btn active" id="loginTabBtn">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
            <button class="tab-btn" id="registerTabBtn">
                <i class="fas fa-user-plus"></i> Registrarse
            </button>
        </div>

        <div class="forms-wrapper">
            <!-- FORMULARIO DE LOGIN -->
            <div id="loginFormPanel" class="form-panel">
                <div class="form-title">Bienvenida de vuelta</div>
                <div class="form-subtitle">Ingresa a tu cuenta exclusiva</div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe"> Recordarme
                        </label>
                        <a href="#" class="forgot-link" id="forgotPassLink">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-arrow-right-to-bracket"></i> Ingresar
                    </button>
                </form>

                <div class="social-divider">
                    <span>O accede con</span>
                </div>
                <div class="social-buttons">
                    <div class="social-btn google-btn">
                        <i class="fab fa-google"></i> <span>Google</span>
                    </div>
                    <div class="social-btn facebook-btn">
                        <i class="fab fa-facebook-f"></i> <span>Facebook</span>
                    </div>
                </div>
            </div>

            <!-- FORMULARIO DE REGISTRO (inicialmente oculto) -->
            <div id="registerFormPanel" class="form-panel hidden">
                <div class="form-title">Crear cuenta</div>
                <div class="form-subtitle">Únete a nuestra comunidad</div>

                <form id="registerForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="Nombre completo" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Contraseña" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirmar contraseña" required>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-user-check"></i> Registrarse
                    </button>
                </form>

                <div class="social-divider">
                    <span>O regístrate con</span>
                </div>
                <div class="social-buttons">
                    <div class="social-btn google-btn">
                        <i class="fab fa-google"></i> <span>Google</span>
                    </div>
                    <div class="social-btn facebook-btn">
                        <i class="fab fa-facebook-f"></i> <span>Facebook</span>
                    </div>
                </div>
                <div class="terms-text">
                    Al registrarte aceptas nuestros <a href="#">Términos y Condiciones</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast de alerta -->
    <div id="alertToast" class="alert-toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage"></span>
    </div>
    <script src="script.js"></script>
</body>
</html>
